<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin</title>
    <link rel="stylesheet" href="css.style.css.css">
</head>
<body>

<div class="dashboard">

    <aside>
        <h2>Admin Panel</h2>

        <ul>
            <li>Data Siswa</li>
            <li>Data Jurusan</li>
            <li>Rule Forward Chaining</li>
            <li>Laporan</li>
        </ul>
    </aside>

    <main>
        <h1>Dashboard Sistem Pakar</h1>

        <div class="card-container">

            <div class="card">
                <h3>120</h3>
                <p>Data Siswa</p>
            </div>

            <div class="card">
                <h3>5</h3>
                <p>Jurusan</p>
            </div>

            <div class="card">
                <h3>20</h3>
                <p>Rule Sistem</p>
            </div>

        </div>

    </main>

</div>

</body>
</html>
